name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    name: Release macOS
    runs-on: macos-latest
    env:
      VITE_EASY_SEND_API_BASE_URL: ${{ vars.DESKTOP_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate desktop API base URL
        run: |
          if [ -z "$VITE_EASY_SEND_API_BASE_URL" ]; then
            echo "Missing repository variable DESKTOP_API_BASE_URL."
            echo "Set it to your deployed backend, for example: https://your-backend.vercel.app/api"
            exit 1
          fi

      - name: Ensure release tag exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS bundle
        run: npm --workspace desktop-client run tauri:build

      - name: Publish macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || format('VercelSend {0}', inputs.version) }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            desktop-client/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    name: Release Windows
    runs-on: windows-latest
    env:
      VITE_EASY_SEND_API_BASE_URL: ${{ vars.DESKTOP_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate desktop API base URL
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_EASY_SEND_API_BASE_URL)) {
            Write-Error "Missing repository variable DESKTOP_API_BASE_URL. Set it to your deployed backend, for example: https://your-backend.vercel.app/api"
          }

      - name: Ensure release tag exists
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags
          git rev-parse $env:VERSION 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            git tag $env:VERSION
            git push origin $env:VERSION
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows bundle
        run: npm --workspace desktop-client run tauri:build

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $releaseDir = "desktop-client/src-tauri/target/release"
          $bundleDir = Join-Path $releaseDir "bundle/windows-portable"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null

          $exe = Get-ChildItem -Path $releaseDir -Filter *.exe -File |
            Where-Object { $_.Name -notmatch "uninstall|setup|updater" } |
            Select-Object -First 1

          if (-not $exe) {
            throw "Could not find built Windows executable in $releaseDir"
          }

          $zipPath = Join-Path $bundleDir "VercelSend-windows-portable.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -Force

      - name: Publish Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || format('VercelSend {0}', inputs.version) }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            desktop-client/src-tauri/target/release/bundle/msi/*.msi
            desktop-client/src-tauri/target/release/bundle/nsis/*.exe
            desktop-client/src-tauri/target/release/bundle/windows-portable/*.zip
